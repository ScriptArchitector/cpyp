<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install Vektra Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --card-bg: rgba(22, 27, 34, 0.8);
            --text: #c9d1d9;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle background glow */
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            color: var(--white);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background-color: var(--accent);
            color: var(--bg);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-download svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .sub-link {
            margin-top: 20px;
            color: #484f58;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .sub-link:hover {
            color: var(--accent);
        }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
        }

        @media (max-width: 600px) {
            .tagline { font-size: 0.9rem; }
            .btn-download { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <main>
        <div class="logo">Vektra</div>
        <p class="tagline">Official installer for the Vektra Engine core. High performance, zero bloat.</p>
        
        <a href="https://github.com/ScriptArchitector/Vektra-Engine/releases/latest" class="btn-download">
            Download for Windows (.exe)
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C12.5523 2 13 2.44772 13 3V13.5858L15.2929 11.2929C15.6834 10.9024 16.3166 10.9024 16.7071 11.2929C17.0976 11.6834 17.0976 12.3166 16.7071 12.7071L12.7071 16.7071C12.3166 17.0976 11.6834 17.0976 11.2929 16.7071L7.29289 12.7071C6.90237 12.3166 6.90237 11.6834 7.29289 11.2929C7.68342 10.9024 8.31658 10.9024 8.70711 11.2929L11 13.5858V3C11 2.44772 11.4477 2 12 2ZM5 18C4.44772 18 4 18.4477 4 19C4 19.5523 4.44772 20 5 20H19C19.5523 20 20 19.5523 20 19C20 18.4477 19.5523 18 19 18H5Z"/>
            </svg>
        </a>

        <a href="https://github.com/ScriptArchitector" class="sub-link">View Source on GitHub</a>
    </main>

    <footer>
        &copy; 2026 Nikita Varfolomeev. Protected by Cloudflare.
    </footer>

</body>
</html>
