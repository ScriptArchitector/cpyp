<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Vektra Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background-color: var(--accent);
            color: var(--bg);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-download:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #484f58;
            font-family: 'JetBrains Mono', monospace;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container">
        <h1 class="title">Official Vektra Engine</h1>
        <p class="tagline">High-performance core for next-gen development.</p>
        
        <a href="https://github.com/ScriptArchitector/Vektra-Engine/releases/latest" class="btn-download">
            Download Vektra Engine
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C12.5523 2 13 2.44772 13 3V13.5858L15.2929 11.2929C15.6834 10.9024 16.3166 10.9024 16.7071 11.2929C17.0976 11.6834 17.0976 12.3166 16.7071 12.7071L12.7071 16.7071C12.3166 17.0976 11.6834 17.0976 11.2929 16.7071L7.29289 12.7071C6.90237 12.3166 6.90237 11.6834 7.29289 11.2929C7.68342 10.9024 8.31658 10.9024 8.70711 11.2929L11 13.5858V3C11 2.44772 11.4477 2 12 2ZM5 18C4.44772 18 4 18.4477 4 19C4 19.5523 4.44772 20 5 20H19C19.5523 20 20 19.5523 20 19C20 18.4477 19.5523 18 19 18H5Z"/>
            </svg>
        </a>

        <div class="status">Build v1.0.0 • Open Source • x64</div>
    </div>

</body>
</html>
